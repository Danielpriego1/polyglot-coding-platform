<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play - Aprende Python Jugando 🐍</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;color:#333}
        .container{max-width:1200px;margin:0 auto;padding:20px}
        header{text-align:center;color:white;padding:40px 20px}
        header h1{font-size:2.5em;margin-bottom:10px}
        header p{font-size:1.1em;opacity:.9}
        .status-bar{background:rgba(255,255,255,.15);color:white;text-align:center;padding:10px;border-radius:8px;margin-bottom:20px;font-size:.9em}
        .challenges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:20px}
        .card{background:white;border-radius:16px;padding:24px;box-shadow:0 10px 40px rgba(0,0,0,.1);transition:transform .2s;cursor:pointer}
        .card:hover{transform:translateY(-5px)}
        .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.72em;font-weight:700;text-transform:uppercase;margin-bottom:10px}
        .easy{background:#dcfce7;color:#166534}
        .medium{background:#fef3c7;color:#92400e}
        .hard{background:#fee2e2;color:#991b1b}
        .points{color:#7c3aed;font-weight:700;font-size:.9em;margin-top:8px}
        .card h3{margin:8px 0;font-size:1.1em}
        .card p{color:#64748b;font-size:.88em;line-height:1.5}
        .btn-play{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600;margin-top:14px;width:100%;font-size:.95em}
        #modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:1000;overflow-y:auto;padding:20px}
        .editor-wrap{background:#1e293b;color:#e2e8f0;max-width:920px;margin:20px auto;border-radius:16px;overflow:hidden}
        .editor-top{background:#0f172a;padding:18px 24px;display:flex;justify-content:space-between;align-items:flex-start}
        .editor-top h3{color:white;font-size:1.1em;margin-bottom:4px}
        .editor-top p{color:#94a3b8;font-size:.85em}
        .editor-body{padding:20px}
        textarea{width:100%;height:280px;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:8px;padding:16px;font-family:'JetBrains Mono','Fira Code',monospace;font-size:13px;resize:vertical;line-height:1.6}
        .output{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:14px;margin-top:14px;min-height:70px;white-space:pre-wrap;font-family:monospace;font-size:13px;color:#94a3b8}
        .ok{color:#4ade80} .err{color:#f87171} .info{color:#60a5fa}
        .btn-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
        .btn{padding:10px 22px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:.9em}
        .btn-run{background:#22c55e;color:white}
        .btn-submit{background:#3b82f6;color:white}
        .btn-close{background:#64748b;color:white}
        .leaderboard{background:white;border-radius:16px;padding:24px;margin-top:30px;box-shadow:0 10px 40px rgba(0,0,0,.1)}
        .leaderboard h2{margin-bottom:16px;color:#7c3aed}
        table{width:100%;border-collapse:collapse}
        th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #f1f5f9;font-size:.9em}
        th{color:#64748b;font-weight:600}
        .r1{color:#eab308;font-weight:700} .r2{color:#94a3b8;font-weight:700} .r3{color:#b45309;font-weight:700}
        #loading{color:white;text-align:center;padding:60px 20px}
        #loading h2{font-size:1.8em;margin-bottom:12px}
        .spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,.3);border-top:4px solid white;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto}
        @keyframes spin{to{transform:rotate(360deg)}}
        .completed-badge{background:#dcfce7;color:#166534;padding:2px 8px;border-radius:10px;font-size:.75em;margin-left:8px}
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🐍 Play</h1>
        <p>Aprende Python jugando — ejecuta código real en tu navegador</p>
    </header>
    <div id="loading">
        <div class="spinner"></div>
        <h2>Cargando Python...</h2>
        <p id="loading-msg">Iniciando Pyodide (puede tardar ~15 segundos la primera vez)</p>
    </div>
    <div id="app" style="display:none">
        <div class="status-bar" id="status-bar">✅ Python listo | Usuario: <span id="uid-display"></span></div>
        <div class="challenges-grid" id="challenges"></div>
        <div class="leaderboard" id="leaderboard" style="display:none">
            <h2>🏆 Leaderboard</h2>
            <table><thead><tr><th>#</th><th>Jugador</th><th>Retos</th><th>Puntos</th></tr></thead>
            <tbody id="lb-body"></tbody></table>
        </div>
    </div>
</div>

<div id="modal">
    <div class="editor-wrap">
        <div class="editor-top">
            <div>
                <h3 id="m-title">Reto</h3>
                <p id="m-desc"></p>
            </div>
            <button class="btn btn-close" onclick="closeModal()">✕</button>
        </div>
        <div class="editor-body">
            <textarea id="code" spellcheck="false"></textarea>
            <div class="btn-row">
                <button class="btn btn-run" onclick="runCode()">▶ Ejecutar</button>
                <button class="btn btn-submit" onclick="submitCode()">✓ Enviar Reto</button>
                <button class="btn btn-close" onclick="closeModal()">✕ Cerrar</button>
            </div>
            <div class="output" id="output">El output aparecerá aquí después de ejecutar...</div>
        </div>
    </div>
</div>

<script>
const API = window.location.origin;
let pyodide = null;
let currentChallenge = null;
let completedChallenges = new Set(JSON.parse(localStorage.getItem('completed') || '[]'));
let userId = localStorage.getItem('uid') || 'usr_' + Math.random().toString(36).substr(2,8);
localStorage.setItem('uid', userId);

async function init() {
    document.getElementById('uid-display').textContent = userId;
    document.getElementById('loading-msg').textContent = 'Cargando Python WASM (Pyodide)...';
    try {
        pyodide = await loadPyodide();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        await loadChallenges();
        await loadLeaderboard();
    } catch(e) {
        document.getElementById('loading-msg').textContent = 'Error al cargar Pyodide: ' + e.message;
    }
}

async function loadChallenges() {
    const res = await fetch(`${API}/challenges?language=python`);
    const data = await res.json();
    const grid = document.getElementById('challenges');
    grid.innerHTML = data.map(c => `
        <div class="card" onclick="openChallenge('${c.id}')">
            <span class="badge ${c.difficulty}">${c.difficulty}</span>
            ${completedChallenges.has(c.id) ? '<span class="completed-badge">✅ Completado</span>' : ''}
            <h3>${c.title}</h3>
            <p>${c.description}</p>
            <p class="points">🏆 ${c.points} puntos</p>
            <button class="btn-play">▶ Jugar</button>
        </div>
    `).join('');
}

async function openChallenge(id) {
    const res = await fetch(`${API}/challenges/${id}`);
    currentChallenge = await res.json();
    document.getElementById('m-title').textContent = currentChallenge.title;
    document.getElementById('m-desc').textContent = currentChallenge.description;
    document.getElementById('code').value = currentChallenge.starter_code;
    document.getElementById('output').textContent = 'El output aparecerá aquí...';
    document.getElementById('output').className = 'output';
    document.getElementById('modal').style.display = 'block';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

async function runCode() {
    const code = document.getElementById('code').value;
    const out = document.getElementById('output');
    out.textContent = '';
    out.className = 'output info';
    let output = '';
    pyodide.setStdout({ batched: (msg) => { output += msg + '\n'; } });
    pyodide.setStderr({ batched: (msg) => { output += '[Error] ' + msg + '\n'; } });
    try {
        await pyodide.runPythonAsync(code);
        out.textContent = output || '(sin output)';
        out.className = 'output ok';
    } catch(e) {
        out.textContent = e.message;
        out.className = 'output err';
    }
}

async function submitCode() {
    const code = document.getElementById('code').value;
    const out = document.getElementById('output');
    let output = '';
    pyodide.setStdout({ batched: (msg) => { output += msg + '\n'; } });
    pyodide.setStderr({ batched: (msg) => { output += '[Error] ' + msg + '\n'; } });
    try {
        await pyodide.runPythonAsync(code);
    } catch(e) {
        out.textContent = '❌ Error en tu código: ' + e.message;
        out.className = 'output err';
        return;
    }
    const res = await fetch(`${API}/execute`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ code, challenge_id: currentChallenge.id, user_id: userId, output })
    });
    const data = await res.json();
    if (data.success) {
        out.textContent = `✅ ¡Correcto! +${data.score} puntos (Intento ${data.attempts})\n\nOutput:\n${output}`;
        out.className = 'output ok';
        completedChallenges.add(currentChallenge.id);
        localStorage.setItem('completed', JSON.stringify([...completedChallenges]));
        await loadChallenges();
        await loadLeaderboard();
    } else {
        out.textContent = `❌ ${data.output} (Intento ${data.attempts})\n\nOutput:\n${output}`;
        out.className = 'output err';
    }
}

async function loadLeaderboard() {
    const res = await fetch(`${API}/leaderboard`);
    const data = await res.json();
    const div = document.getElementById('leaderboard');
    if (!data.length) { div.style.display = 'none'; return; }
    div.style.display = 'block';
    document.getElementById('lb-body').innerHTML = data.map((e, i) =>
        `<tr><td class="r${i+1}">${i+1}</td><td>${e.username}</td><td>${e.challenges_completed}</td><td><strong>${e.total_score}</strong></td></tr>`
    ).join('');
}

init();
</script>
</body>
</html>
